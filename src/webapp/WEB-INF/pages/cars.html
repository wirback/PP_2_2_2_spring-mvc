<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List Cars</title>
</head>
<body>

<table>
    <tr>
        <th>MODEL</th>
        <th>SERIES</th>
        <th>COLOR</th>
    </tr>
    <tr th:each="list : ${carlist}">
        <td th:text="${list.getModel()}"/>
        <td th:text="${list.getSeries()}"/>
        <td th:text="${list.getColor()}"/>
    </tr>
</table>

</div>

</body>
</html>
